<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100%;
    }
    .container {
      background: #1a1925;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
      margin: 4px;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 16px 12px;
    }
    .icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      color: rgba(255, 255, 255, 0.25);
    }
    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e6f0;
      font-size: 14px;
      font-weight: 400;
      font-family: inherit;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    .hints {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
    }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      font-size: 10px;
      font-family: inherit;
      color: rgba(255, 255, 255, 0.35);
    }
    .added-feedback {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 0 16px 10px;
      font-size: 12px;
      color: #22c55e;
      animation: fade-in 0.15s ease-out;
    }
    .added-feedback.show { display: flex; }
    .added-feedback svg { width: 14px; height: 14px; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="input-row">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input
        id="input"
        type="text"
        placeholder="Add a task..."
        autofocus
      />
    </div>
    <div class="hints">
      <span><kbd>Enter</kbd> add to Inbox</span>
      <span>&middot;</span>
      <span><kbd>Shift+Enter</kbd> add to Today</span>
      <span>&middot;</span>
      <span><kbd>Esc</kbd> close</span>
    </div>
    <div class="added-feedback" id="feedback">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
      <span id="feedback-text"></span>
    </div>
  </div>
  <script>
    const { invoke } = window.__TAURI__.core;

    const input = document.getElementById('input');
    const feedback = document.getElementById('feedback');
    const feedbackText = document.getElementById('feedback-text');
    let feedbackTimer = null;

    function showFeedback(message) {
      feedbackText.textContent = message;
      feedback.classList.add('show');
      if (feedbackTimer) clearTimeout(feedbackTimer);
      feedbackTimer = setTimeout(() => {
        feedback.classList.remove('show');
      }, 1500);
    }

    input.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const text = input.value.trim();
        if (text) {
          const toToday = e.shiftKey;
          await invoke('quick_add_task', { text, toToday });
          input.value = '';
          showFeedback(toToday ? 'Added to Today' : 'Added to Inbox');
        }
      }
      if (e.key === 'Escape') {
        await invoke('close_quick_add');
      }
    });

    // Re-focus and select input when window becomes visible
    window.addEventListener('focus', () => {
      input.focus();
      input.select();
    });
  </script>
</body>
</html>
