<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — zenmode</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #fafaf9; color: #44403c; }
    .msg { text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <div class="msg">
    <p>Signing you in...</p>
  </div>
  <script>
    // Extract tokens from URL hash/query and redirect back to Expo Go
    const hash = window.location.hash.substring(1);
    const search = window.location.search.substring(1);
    const params = hash || search;

    if (params) {
      // Try intent:// URI (reliable way to open apps from Chrome on Android)
      const intentUrl = 'intent://auth?' + params + '#Intent;scheme=exp;package=host.exp.exponent;end';
      window.location.href = intentUrl;

      // Fallback: show message after a delay if redirect didn't work
      setTimeout(function() {
        document.querySelector('.msg p').textContent = 'Sign in successful. You can close this tab and return to the app.';
      }, 2000);
    } else {
      document.querySelector('.msg p').textContent = 'Sign in successful. You can close this tab and return to the app.';
    }
  </script>
</body>
</html>
