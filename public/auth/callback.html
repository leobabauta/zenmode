<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — zenmode</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #fafaf9; color: #44403c; }
    .msg { text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <div class="msg">
    <p id="status">Signing you in...</p>
  </div>
  <script>
    // Google implicit flow puts params in the hash fragment:
    // #id_token=TOKEN&state=exp://IP:PORT/--/auth&...
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var idToken = params.get('id_token');
    var returnUrl = params.get('state'); // This is the Expo dev URL

    if (idToken && returnUrl) {
      // Build the deep link: exp://10.0.0.29:8081/--/auth?id_token=TOKEN
      var deepLink = returnUrl + '?id_token=' + encodeURIComponent(idToken);

      // Try direct navigation first
      window.location.href = deepLink;

      // Fallback message
      setTimeout(function() {
        document.getElementById('status').innerHTML =
          'Sign in successful!<br><br>' +
          '<a href="' + deepLink + '" style="color:#6366f1">Tap here to return to the app</a><br><br>' +
          '<small>Or close this tab and return to Expo Go manually.</small>';
      }, 1500);
    } else {
      document.getElementById('status').textContent =
        'Sign in successful. You can close this tab and return to the app.';
    }
  </script>
</body>
</html>
